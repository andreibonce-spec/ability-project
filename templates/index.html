<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABILITY - Asistent Educațional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .chat-message { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .dot { animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body class="bg-gray-100 h-screen font-sans antialiased text-gray-800 flex flex-col">

    <!-- antet -->
    <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-md z-20 shrink-0">
        <div class="max-w-4xl mx-auto p-4 flex justify-between items-center w-full">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center border border-white/40">
                    <i class="fas fa-brain text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight tracking-wide">ABILITY</h1>
                    <p class="text-xs text-blue-100 opacity-90 hidden sm:block">Asistent Educațional</p>
                </div>
            </div>
            <button id="settingsBtn" class="text-white hover:bg-white/20 px-4 py-2 rounded-lg transition duration-200 flex items-center gap-2 text-sm">
                <i class="fas fa-sliders-h"></i>
                <span class="hidden sm:inline">Setări Elev</span>
            </button>
        </div>
    </header>

    <!-- filtre ?? -->
    <div id="filtersPanel" class="hidden bg-white border-b border-gray-200 z-10 shadow-sm shrink-0">
        <div class="max-w-4xl mx-auto p-4">
            <p class="text-xs text-gray-500 mb-3 font-semibold uppercase tracking-wider">Contextul elevului</p>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Vârstă (ex: 5-9)</label>
                    <input type="text" id="filterVarsta" class="w-full p-2 bg-gray-50 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Categorie (ex: tranzitii)</label>
                    <input type="text" id="filterCategorie" class="w-full p-2 bg-gray-50 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Context (ex: clasa)</label>
                    <input type="text" id="filterContext" class="w-full p-2 bg-gray-50 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </div>
    </div>

    <!-- zona de chat -->
    <main id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar w-full max-w-4xl mx-auto">
        <div class="flex items-start gap-3 chat-message mt-4">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center text-white shrink-0 shadow-md">
                <i class="fas fa-robot"></i>
            </div>
            <div class="bg-white border border-gray-200 p-4 rounded-2xl rounded-tl-none shadow-sm text-sm sm:text-base max-w-[85%] leading-relaxed">
                Salut! Sunt ABILITY. Sunt aici să te ajut cu strategii practice pentru elevi. Descrie-mi comportamentul sau situația pe care vrei să o gestionezi!
            </div>
        </div>
    </main>

    <!-- inputuri -->
    <footer class="bg-white border-t border-gray-200 p-4 z-20 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="max-w-4xl mx-auto">
            <form id="chatForm" class="flex items-end gap-3">
                <textarea id="userInput" rows="1" class="flex-1 bg-gray-100 px-4 py-3 sm:py-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none text-sm sm:text-base transition-all border border-transparent focus:border-blue-300 focus:bg-white" placeholder="Scrie mesajul tău aici..." style="min-height: 48px; max-height: 150px;"></textarea>
                <button type="submit" class="bg-blue-600 text-white w-12 h-12 sm:w-14 sm:h-14 rounded-full flex items-center justify-center hover:bg-blue-700 transition duration-200 shrink-0 shadow-md">
                    <i class="fas fa-paper-plane text-lg sm:text-xl"></i>
                </button>
            </form>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chatBox');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const settingsBtn = document.getElementById('settingsBtn');
        const filtersPanel = document.getElementById('filtersPanel');

        settingsBtn.addEventListener('click', () => { filtersPanel.classList.toggle('hidden'); });

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex items-start gap-3 chat-message ${isUser ? 'flex-row-reverse' : ''}`;
            
            const avatar = document.createElement('div');
            avatar.className = `w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-md ${isUser ? 'bg-gray-800 text-white' : 'bg-gradient-to-tr from-blue-500 to-indigo-500 text-white'}`;
            avatar.innerHTML = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';

            const bubble = document.createElement('div');
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            bubble.className = `p-4 rounded-2xl shadow-sm text-sm sm:text-base max-w-[85%] leading-relaxed whitespace-pre-wrap ${isUser ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white border border-gray-200 text-gray-800 rounded-tl-none'}`;
            bubble.innerHTML = formattedText;

            div.appendChild(avatar);
            div.appendChild(bubble);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'flex items-start gap-3 chat-message';
            div.innerHTML = `
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center text-white shrink-0 shadow-md">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="bg-white border border-gray-200 py-4 px-5 rounded-2xl rounded-tl-none shadow-sm flex gap-1 items-center">
                    <div class="w-2 h-2 bg-gray-400 rounded-full dot"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full dot"></div>
                    <div class="w-2 h-2 bg-gray-400 rounded-full dot"></div>
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            const varsta = document.getElementById('filterVarsta').value.trim();
            const categorie = document.getElementById('filterCategorie').value.trim();
            const context = document.getElementById('filterContext').value.trim();

            addMessage(text, true);
            userInput.value = '';
            userInput.style.height = 'auto';
            showTyping();

            try {
                const response = await fetch('/api/intrebare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ intrebare: text, varsta: varsta, categorie: categorie, context: context })
                });

                const data = await response.json();
                removeTyping();
                
                if (data.raspuns) { addMessage(data.raspuns, false); } 
                else { addMessage("Eroare de procesare.", false); }

            } catch (error) {
                console.error('Error:', error);
                removeTyping();
                addMessage("Nu m-am putut conecta la server.", false);
            }
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
