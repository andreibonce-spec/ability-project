<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABILITY - Asistent Educațional CES</title>
    <!-- Tailwind CSS prin CDN pentru design modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome pentru iconițe (buton send, robot, user, setari) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Ascundem scrollbar-ul urât pentru un aspect de aplicație nativă */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Containerul care simulează ecranul de telefon pe desktop */
        .app-container {
            max-width: 414px; /* Lățime iPhone Pro Max */
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f8fafc;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        /* Pe ecrane mari, îi dăm margini rotunjite (să pară un telefon fizic) */
        @media (min-width: 640px) {
            .app-container {
                height: 850px;
                border-radius: 2.5rem;
                margin-top: 2rem;
                border: 8px solid #1e293b; /* Marginea neagra a "telefonului" */
            }
        }

        /* Animație pentru apariția mesajelor */
        .chat-message { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Animație pentru indicatorul "scrie..." */
        .dot { animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body class="bg-gray-200 min-h-screen font-sans antialiased text-gray-800">

    <div class="app-container relative overflow-hidden flex flex-col z-10">
        
        <!-- HEADER (Bara superioară) -->
        <header class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-4 flex justify-between items-center z-20 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center border border-white/40">
                    <i class="fas fa-brain text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight tracking-wide">ABILITY</h1>
                    <p class="text-xs text-blue-100 opacity-90">Asistent Educațional CES</p>
                </div>
            </div>
            <button id="settingsBtn" class="text-white hover:bg-white/20 p-2 rounded-full transition duration-200">
                <i class="fas fa-sliders-h"></i>
            </button>
        </header>

        <!-- FILTRE (Ascunse inițial, se deschid la apăsarea pe setări) -->
        <div id="filtersPanel" class="hidden bg-white p-4 border-b border-gray-200 z-10 shadow-inner text-sm transition-all">
            <p class="text-xs text-gray-500 mb-3 font-semibold uppercase tracking-wider">Setează contextul elevului</p>
            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-[11px] text-gray-400 mb-1">Vârstă</label>
                    <input type="text" id="filterVarsta" placeholder="ex: 5-9" class="w-full p-2 bg-gray-50 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-[11px] text-gray-400 mb-1">Categorie</label>
                    <input type="text" id="filterCategorie" placeholder="tranzitii" class="w-full p-2 bg-gray-50 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-[11px] text-gray-400 mb-1">Context</label>
                    <input type="text" id="filterContext" placeholder="clasa" class="w-full p-2 bg-gray-50 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </div>

        <!-- ZONA DE CHAT -->
        <main id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-5 no-scrollbar bg-gray-50 pb-24">
            <!-- Mesaj introductiv -->
            <div class="flex items-end gap-2 chat-message">
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center text-white flex-shrink-0 shadow-sm">
                    <i class="fas fa-robot text-xs"></i>
                </div>
                <div class="bg-white border border-gray-100 p-3 rounded-2xl rounded-bl-none shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] text-sm max-w-[85%] leading-relaxed">
                    Salut! Sunt ABILITY. Sunt aici să te ajut cu strategii practice pentru elevii cu CES. Scrie-mi provocarea pe care o întâmpini!
                    <br><br><span class="text-xs text-gray-400">(Apasă pe iconița din dreapta-sus pentru a seta vârsta și contextul)</span>
                </div>
            </div>
        </main>

        <!-- ZONA DE INPUT (Bara inferioară) -->
        <footer class="absolute bottom-0 w-full bg-white border-t border-gray-100 p-3 z-20 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.05)]">
            <form id="chatForm" class="flex items-end gap-2">
                <textarea id="userInput" rows="1" class="flex-1 bg-gray-100 px-4 py-3 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 resize-none text-sm transition-all" placeholder="Scrie mesajul tău aici..." style="min-height: 44px; max-height: 120px;"></textarea>
                <button type="submit" class="bg-blue-600 text-white w-11 h-11 rounded-full flex items-center justify-center hover:bg-blue-700 transition duration-200 flex-shrink-0 shadow-md">
                    <i class="fas fa-paper-plane ml-[-2px]"></i>
                </button>
            </form>
        </footer>
    </div>

    <script>
        const chatBox = document.getElementById('chatBox');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const settingsBtn = document.getElementById('settingsBtn');
        const filtersPanel = document.getElementById('filtersPanel');

        // Ascundere/Afișare panou de filtre
        settingsBtn.addEventListener('click', () => {
            filtersPanel.classList.toggle('hidden');
        });

        // Auto-redimensionare zona de scris text (textarea)
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Funcție pentru a adăuga un mesaj în interfață
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex items-end gap-2 chat-message ${isUser ? 'flex-row-reverse' : ''}`;
            
            // Creare Avatar
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 shadow-sm ${isUser ? 'bg-gray-800 text-white' : 'bg-gradient-to-tr from-blue-500 to-indigo-500 text-white'}`;
            avatar.innerHTML = isUser ? '<i class="fas fa-user text-xs"></i>' : '<i class="fas fa-robot text-xs"></i>';

            // Creare Bula de text
            const bubble = document.createElement('div');
            // Formatăm textul cu bold acolo unde folosim asteriscuri (dacă Claude returnează Markdown simplu)
            let formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            bubble.className = `p-3.5 rounded-2xl shadow-sm text-sm max-w-[85%] leading-relaxed whitespace-pre-wrap ${isUser ? 'bg-blue-600 text-white rounded-br-none shadow-[0_2px_10px_-3px_rgba(6,81,237,0.3)]' : 'bg-white border border-gray-100 text-gray-800 rounded-bl-none shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)]'}`;
            bubble.innerHTML = formattedText;

            div.appendChild(avatar);
            div.appendChild(bubble);
            chatBox.appendChild(div);

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Funcție pentru animația de tiping (cele 3 puncte)
        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'flex items-end gap-2 chat-message';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-indigo-500 flex items-center justify-center text-white flex-shrink-0 shadow-sm">
                    <i class="fas fa-robot text-xs"></i>
                </div>
                <div class="bg-white border border-gray-100 py-4 px-4 rounded-2xl rounded-bl-none shadow-sm flex gap-1 items-center">
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full dot"></div>
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full dot"></div>
                </div>
            `;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        // Ce se întâmplă când apeși pe butonul de Trimite
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const text = userInput.value.trim();
            if (!text) return;

            // Preluăm setările (vârstă, categorie, context)
            const varsta = document.getElementById('filterVarsta').value.trim();
            const categorie = document.getElementById('filterCategorie').value.trim();
            const context = document.getElementById('filterContext').value.trim();

            addMessage(text, true);
            
            // Resetare căsuță de text
            userInput.value = '';
            userInput.style.height = 'auto';
            
            showTyping();

            try {
                // Trimitem datele către Python
                const response = await fetch('/api/intrebare', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        intrebare: text,
                        varsta: varsta,
                        categorie: categorie,
                        context: context
                    })
                });

                const data = await response.json();
                removeTyping();
                
                if (data.raspuns) {
                    addMessage(data.raspuns, false);
                } else {
                    addMessage("Scuze, am întâmpinat o eroare.", false);
                }

            } catch (error) {
                console.error('Error:', error);
                removeTyping();
                addMessage("Nu m-am putut conecta la server. Verifică dacă aplicația Python rulează.", false);
            }
        });

        // Dacă utilizatorul apasă Enter pe tastatură, se trimite mesajul
        // Dacă apasă Shift+Enter, trece pe rând nou.
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
